<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Учусь.РФ — Новая заявка</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <div class="logo"><a href="../../index.html">Учусь.<span>РФ</span></a></div>
        <nav>
            <a href="profile.html">Кабинет</a>
            <a href="#" class="logout-btn">Выйти</a>
        </nav>
    </header>

    <div class="container">
        <div class="card">
            <h2>Новая заявка</h2>
            <p class="small" style="margin-bottom:16px;">Заполните форму для записи на курс</p>

            <form id="applyForm" novalidate>
                <div class="form-group">
                    <label>Курс</label>
                    <select id="course" required>
                        <option value="">— выберите курс —</option>
                    </select>
                    <div class="error-msg">Пожалуйста, выберите курс</div>
                </div>

                <div class="form-group">
                    <label>Дата начала (ДД.ММ.ГГГГ)</label>
                    <input type="text" id="date" placeholder="01.07.2026" required>
                    <div class="error-msg">Введите дату в формате ДД.ММ.ГГГГ</div>
                </div>

                <div class="form-group">
                    <label>Способ оплаты</label>
                    <select id="payment" required>
                        <option value="">— выберите способ —</option>
                        <option value="Предоплата по QR-коду (МИР)">Предоплата по QR-коду (карта МИР)</option>
                        <option value="Оплата картой МИР">Оплата картой МИР</option>
                        <option value="Постоплата в офисе">Постоплата в офисе организации</option>
                    </select>
                    <div class="error-msg">Выберите способ оплаты</div>
                </div>

                <button type="submit" class="btn btn-primary">Отправить заявку</button>
            </form>
        </div>
    </div>

    <footer>
        <div class="container">
            <p>© 2026 Учусь.РФ. Все права защищены.</p>
            <p>г. Москва, ул. Большая Ордынка, д. 15</p>
            <p>Тел: <a href="tel:+74951234567">+7 (495) 123-45-67</a></p>
        </div>
    </footer>

    <script src="../js/script.js"></script>
</body>
</html>
