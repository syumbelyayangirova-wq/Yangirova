<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Учусь.РФ — Админ-панель</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <div class="logo">Админ-панель</div>
        <nav>
            <a href="../../index.html">На сайт</a>
            <a href="#" class="admin-logout">Выйти</a>
        </nav>
    </header>

    <div class="container admin-panel">
        <!-- Форма входа в админку -->
        <div class="card" id="adminLoginCard">
            <h2>Вход администратора</h2>
            <p class="small" style="margin-bottom:16px;">Введите логин Admin26 и пароль Demo20</p>
            <form id="adminLoginForm">
                <div class="form-group">
                    <label>Логин</label>
                    <input type="text" id="aLogin" placeholder="Admin26" required>
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="aPass" placeholder="Demo20" required>
                </div>
                <button type="submit" class="btn btn-primary">Войти</button>
            </form>
        </div>

        <!-- Рабочая область -->
        <div id="adminWorkArea" style="display:none;">
            <div class="card">
                <h2>Управление заявками</h2>

                <!-- Фильтры -->
                <div class="admin-tools">
                    <div class="filter-group">
                        <label>Поиск</label>
                        <input type="text" id="search" placeholder="ФИО или курс...">
                    </div>
                    <div class="filter-group">
                        <label>Статус</label>
                        <select id="filterStatus">
                            <option value="">Все статусы</option>
                            <option value="Новая">Новая</option>
                            <option value="Идет обучение">Идет обучение</option>
                            <option value="Обучение завершено">Обучение завершено</option>
                        </select>
                    </div>
                </div>

                <!-- Таблица -->
                <div class="table-responsive">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th data-sort="userName">ФИО</th>
                                <th data-sort="course">Курс</th>
                                <th data-sort="date">Дата</th>
                                <th>Статус</th>
                                <th>Действие</th>
                            </tr>
                        </thead>
                        <tbody id="appsBody"></tbody>
                    </table>
                </div>

                <!-- Пагинация -->
                <div class="pagination" id="pagination"></div>
            </div>
        </div>
    </div>

    <footer>
        <div class="container">
            <p>© 2026 Учусь.РФ — Панель управления</p>
            <p>г. Москва, ул. Большая Ордынка, д. 15</p>
        </div>
    </footer>

    <script src="../js/script.js"></script>
</body>
</html>
